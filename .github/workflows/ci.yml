# CI pipeline for Pancreatic Cancer OSINT Hub (T6).
#
# Runs on every push to feat/** and main, and on every PR to main.
# Node 22 + 24 matrix (node:sqlite needs Node 22.5+).
# Steps: install -> lint -> test -> build -> npm audit.

name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: lint + test + build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npm run lint

      - name: Run contract tests
        run: npm test

      - name: Build (Vite + esbuild)
        run: npm run build

      - name: Security audit (high+ only)
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true # advisory; surfaces issues without blocking

      - name: Upload dist artifact (Node 24 only)
        if: matrix.node-version == '24.x'
        uses: actions/upload-artifact@v4
        with:
          name: dist-node24
          path: dist/
          retention-days: 7

  docker-build:
    name: Docker image build smoke
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: osintel-pancrepal:ci-smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
